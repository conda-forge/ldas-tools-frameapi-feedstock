schema_version: 1

context:
  name: ldas-tools-frameAPI
  version: "3.0.7"
  ldas_tools_cmake_version: 1.4.1
  ldas_tools_al_version: 2.8.0
  ldas_tools_framecpp_version: 4.0.1
  ldas_tools_filters_version: 2.6.8
  ldas_tools_ldasgen_version: 2.7.5

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: http://software.ligo.org/lscsoft/source/${{ name }}-${{ version }}.tar.gz
  sha256: 7fd03aa25103729877cf8df0c547fc6b516a538a2b24eac6d3761e800b9cae7f

build:
  dynamic_linking:
    missing_dso_allowlist:
      - if: osx
        then: /usr/lib/libSystem.B.dylib
    overdepending_behavior: error
    overlinking_behavior: error
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - ${{ compiler('cxx') }}
    - cmake >=3.6
    - if: unix
      then:
        - make
        - pkg-config
  host:
    - ldas-tools-al >=${{ ldas_tools_al_version }}
    - ldas-tools-cmake >=${{ ldas_tools_cmake_version }}
    - ldas-tools-filters >=${{ ldas_tools_filters_version }}
    - ldas-tools-framecpp >=${{ ldas_tools_framecpp_version }}
    - ldas-tools-ldasgen >=${{ ldas_tools_ldasgen_version }}
    - libboost-devel
  run_exports:
    - ${{ pin_subpackage("ldas-tools-frameapi", upper_bound="x.x") }}

tests:
  - requirements:
      run:
        - if: unix
          then:
            - pkg-config
    script:
      # framecpp 4.x: --channel-adc-type triggers all_type_frame() which
      # emits Z0:RAMPED_<TYPE>_1 channels (vs the default test_frame() path
      # which emits TesT_<method>_<level>_... names).
      # See https://git.ligo.org/computing/ldastools/LDAS_Tools/-/issues/283
      - framecpp_sample --channel-adc-type int_8u
      - "ldas_analysis_ready --frame-file-pattern \"*.gwf\" --ifo Z0 --analysis-ready-channel RAMPED_INT_8U_1"
      - if: unix
        then:
          - test -d ${PREFIX}/include/frameAPI
          - pkg-config --print-errors --exact-version ${{ version }} ldastools-ldasframe

about:
  license: GPL-2.0-or-later
  license_file: COPYING
  summary: LDAS tools frameAPI library
  description: This provides the runtime libraries for the frameAPI library.
  homepage: https://wiki.ligo.org/Computing/LDASTools
  repository: https://git.ligo.org/ldastools/LDAS_Tools

extra:
  recipe-maintainers:
    - duncanmmacleod
    - emaros
